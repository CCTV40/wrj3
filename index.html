<!-- 无人机障碍物圈选 + 记忆功能 -->
<script src="https://unpkg.com/leaflet.editable@1.1.0/dist/Leaflet.Editable.js"></script>
<script>
const drawnItems = new L.FeatureGroup().addTo(map);
const drawControl = new L.Control.Draw({
  edit: { featureGroup: drawnItems },
  draw: { polygon: true }
}).addTo(map);

map.on(L.Draw.Event.CREATED, e => {
  const layer = e.layer;
  drawnItems.addLayer(layer);
  const points = layer.getLatLngs()[0].map(p => [p.lat, p.lng]);
  const obs = JSON.parse(localStorage.getItem('obs') || '[]');
  obs.push(points);
  localStorage.setItem('obs', JSON.stringify(obs));
});

window.onload = () => {
  const obs = JSON.parse(localStorage.getItem('obs') || '[]');
  obs.forEach(p => L.polygon(p, {color:'red'}).addTo(drawnItems));
};
</script>
